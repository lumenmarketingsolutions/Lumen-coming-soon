<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Email Signature</title>
</head>
<body style="margin: 0; padding: 40px; background: #f5f5f5; font-family: Arial, sans-serif;">

<!-- Open this file in Chrome, click inside the white box, Cmd+A to select all, Cmd+C to copy, then paste into Gmail Settings > Signature -->

<table cellpadding="0" cellspacing="0" border="0" style="max-width: 420px; font-family: Arial, Helvetica, sans-serif;">
  <tr>
    <td style="padding-bottom: 12px; border-bottom: 2px solid #6128DB;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="padding-right: 16px; vertical-align: top;">
            <div style="width: 4px; height: 52px; background-color: #6128DB; border-radius: 2px;"></div>
          </td>
          <td style="vertical-align: top;">
            <span style="font-size: 17px; font-weight: bold; color: #1a1a1a; letter-spacing: -0.3px;">Kendall Davis</span>
            <br>
            <span style="font-size: 13px; color: #6b6b6b; line-height: 1.6;">Owner, Engineer</span>
            <br>
            <span style="font-size: 13px; color: #6128DB; font-weight: bold; letter-spacing: -0.2px;">Lumen Marketing Solutions</span>
          </td>
        </tr>
      </table>
    </td>
  </tr>
  <tr>
    <td style="padding-top: 12px;">
      <table cellpadding="0" cellspacing="0" border="0">
        <tr>
          <td style="font-size: 12px; color: #6b6b6b; line-height: 1.8;">
            <a href="https://lumenmarketing.co" style="color: #6128DB; text-decoration: none; font-weight: bold;">lumenmarketing.co</a>
          </td>
        </tr>
      </table>
    </td>
  </tr>
</table>

</body>
</html>
