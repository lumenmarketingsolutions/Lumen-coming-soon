body {

}
.star {
  position: absolute;
  border-radius: 50%;
  background: rgba(255, 255, 255, 0.6);
}
.star.dim { opacity: 0.25; }
.star.bright { opacity: 0.7; }
.star.faint { opacity: 0.12; }
/* Purple glow cluster — very subtle */
.glow {
  position: absolute;
