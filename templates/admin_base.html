<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>{% block title %}Lumen · SCE Admin{% endblock %}</title>
<meta name="robots" content="noindex,nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #14141c;
    --surface-2: #1c1c26;
    --surface-3: #242432;
    --border: rgba(255, 255, 255, 0.08);
    --border-strong: rgba(255, 255, 255, 0.18);
    --text: #e8e8f0;
    --dim: #6b6b80;
    --dim-bright: #9292a8;
    --accent: #6128DB;
    --accent-bright: #7c4dff;
    --accent-soft: rgba(124, 77, 255, 0.16);
    --good: #22c55e;
    --warn: #f59e0b;
    --bad: #ef4444;
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 15px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
  }
  a { color: inherit; text-decoration: none; }

  .layout {
    display: grid;
    grid-template-columns: 240px 1fr;
    min-height: 100vh;
  }
  @media (max-width: 880px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* ─── Sidebar ─── */
  .sidebar {
    background: #08080d;
    border-right: 1px solid var(--border);
    padding: 24px 18px 32px;
    position: sticky; top: 0;
    height: 100vh;
    display: flex; flex-direction: column;
  }
  @media (max-width: 880px) {
    .sidebar {
      position: static; height: auto;
      padding: 14px 18px;
      border-right: 0; border-bottom: 1px solid var(--border);
    }
  }
  .brand {
    font-size: 11px; letter-spacing: 0.28em;
    text-transform: uppercase; font-weight: 700;
    color: var(--accent-bright);
    margin-bottom: 28px;
    padding: 0 6px;
  }
  @media (max-width: 880px) { .brand { margin-bottom: 14px; } }

  .nav-section { margin-bottom: 22px; }
  .nav-label {
    font-size: 10px; letter-spacing: 0.22em;
    text-transform: uppercase; font-weight: 600;
    color: var(--dim); padding: 0 8px; margin-bottom: 8px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 10px;
    padding: 9px 10px; border-radius: 9px;
    color: var(--dim-bright); font-size: 14px; font-weight: 500;
    transition: background 0.18s, color 0.18s;
    cursor: pointer;
  }
  .nav-item:hover { background: var(--surface); color: var(--text); }
  .nav-item.active {
    background: var(--accent-soft);
    color: var(--accent-bright);
    font-weight: 600;
  }
  .nav-item .dot {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--accent-bright);
    margin-right: 4px; flex: 0 0 6px;
  }

  .sidebar-foot {
    margin-top: auto; padding-top: 18px;
    border-top: 1px solid var(--border);
    font-size: 12px; color: var(--dim);
  }
  .sidebar-foot .who {
    color: var(--text); font-weight: 600;
    margin-bottom: 6px; word-break: break-word;
  }
  .sidebar-foot a {
    color: var(--dim);
    text-decoration: none;
    transition: color 0.15s;
  }
  .sidebar-foot a:hover { color: var(--accent-bright); }

  /* ─── Main content ─── */
  .main { padding: 28px 32px 60px; min-width: 0; }
  @media (max-width: 880px) { .main { padding: 24px 18px 60px; } }

  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 22px;
    gap: 12px; flex-wrap: wrap;
  }
  .page-title {
    font-size: 26px; letter-spacing: -0.02em;
    font-weight: 700; margin: 0;
  }
  .page-sub { color: var(--dim); font-size: 14px; margin-top: 4px; }

  /* Tabs */
  .tabs {
    display: flex; gap: 4px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 4px;
    margin-bottom: 22px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab {
    padding: 8px 14px; border-radius: 7px;
    font-size: 13px; font-weight: 600;
    color: var(--dim-bright); cursor: pointer;
    white-space: nowrap;
    transition: background 0.18s, color 0.18s;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    background: var(--surface-2);
    color: var(--accent-bright);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }

  /* Range selector */
  .range {
    display: inline-flex; gap: 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 3px;
  }
  .range a {
    padding: 7px 14px; font-size: 12px; font-weight: 600;
    color: var(--dim-bright); border-radius: 7px;
    letter-spacing: 0.04em;
  }
  .range a.active {
    background: var(--surface-2); color: var(--accent-bright);
    box-shadow: 0 1px 2px rgba(0,0,0,0.2);
  }
  .range a:hover { color: var(--text); }

  /* Common card */
  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18);
  }
  .card h3 {
    font-size: 13px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--dim);
    margin: 0 0 14px; font-weight: 700;
  }
  .card .info {
    color: var(--dim); font-size: 12px;
  }

  /* KPI cards */
  .kpis {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 22px;
  }
  .kpi {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 22px 22px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.18);
  }
  .kpi-label {
    color: var(--dim); font-size: 11px;
    letter-spacing: 0.18em; text-transform: uppercase;
    font-weight: 700; margin-bottom: 10px;
  }
  .kpi-value {
    font-size: 32px; font-weight: 700;
    letter-spacing: -0.02em; line-height: 1;
    font-feature-settings: "tnum" 1;
  }
  .kpi-meta { color: var(--dim); font-size: 12px; margin-top: 8px; }
  .kpi-meta .good { color: var(--good); }
  .kpi-meta .bad { color: var(--bad); }

  /* Page-to-page chart */
  .ptp {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 8px;
    align-items: end;
    height: 220px;
    padding: 10px 0 8px;
  }
  @media (max-width: 540px) {
    .ptp { gap: 6px; height: 180px; }
  }
  .ptp .col {
    display: flex; flex-direction: column;
    align-items: center;
    height: 100%;
    position: relative;
  }
  .ptp .bar {
    width: 100%; max-width: 76px;
    background: linear-gradient(180deg, var(--accent-bright), var(--accent));
    border-radius: 8px 8px 0 0;
    margin-top: auto;
    box-shadow: 0 4px 16px rgba(124, 77, 255, 0.25);
    transition: opacity 0.2s;
  }
  .ptp .bar:hover { opacity: 0.85; }
  .ptp .bar-empty {
    width: 100%; max-width: 76px;
    height: 4px; background: var(--surface-2);
    border-radius: 4px; margin-top: auto;
  }
  .ptp .count {
    color: var(--text); font-size: 14px; font-weight: 700;
    margin-bottom: 6px; font-feature-settings: "tnum" 1;
  }
  .ptp .label {
    color: var(--dim); font-size: 11px;
    letter-spacing: 0.06em;
    margin-top: 8px; text-align: center;
    line-height: 1.3;
  }
  .ptp .drop {
    color: var(--bad); font-size: 11px;
    font-weight: 700; margin-top: 4px;
  }

  /* Time on page chart (similar) */
  .top-bars {
    display: grid; grid-template-columns: repeat(5, 1fr);
    gap: 8px; align-items: end; height: 200px; padding: 10px 0 8px;
  }
  @media (max-width: 540px) {
    .top-bars { gap: 6px; height: 160px; }
  }
  .top-bars .col { display: flex; flex-direction: column; align-items: center; height: 100%; }
  .top-bars .bar {
    width: 100%; max-width: 64px;
    background: linear-gradient(180deg, rgba(124, 77, 255, 0.55), rgba(97, 40, 219, 0.45));
    border-radius: 7px 7px 0 0;
    margin-top: auto;
  }
  .top-bars .bar-empty {
    width: 100%; max-width: 64px; height: 3px;
    background: var(--surface-2); border-radius: 3px; margin-top: auto;
  }
  .top-bars .count {
    color: var(--text); font-size: 13px; font-weight: 700;
    margin-bottom: 4px;
  }
  .top-bars .label {
    color: var(--dim); font-size: 11px; margin-top: 6px;
    text-align: center;
  }

  /* Two-column grid for charts */
  .grid-2 {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-top: 16px;
  }
  @media (max-width: 880px) { .grid-2 { grid-template-columns: 1fr; } }

  /* Hbar list (devices, tiers, restaurants) */
  .hbars { margin-top: 12px; }
  .hbar-row {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 0;
    border-bottom: 1px solid var(--border);
  }
  .hbar-row:last-child { border-bottom: 0; }
  .hbar-name {
    flex: 0 0 120px; min-width: 0;
    font-size: 13px; color: var(--text); font-weight: 500;
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .hbar-track {
    flex: 1; height: 8px;
    background: var(--surface-2); border-radius: 4px;
    overflow: hidden;
  }
  .hbar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-bright));
    border-radius: 4px;
  }
  .hbar-num {
    flex: 0 0 60px;
    text-align: right; font-size: 12px;
    color: var(--dim); font-weight: 600;
    font-feature-settings: "tnum" 1;
  }

  /* Tables */
  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    overflow: hidden;
  }
  .table-scroll {
    overflow-x: auto; -webkit-overflow-scrolling: touch;
  }
  table.tbl {
    width: 100%; border-collapse: collapse;
    min-width: 720px;
  }
  table.tbl th, table.tbl td {
    text-align: left; padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 13px;
  }
  table.tbl th {
    color: var(--dim); font-weight: 600;
    font-size: 11px; letter-spacing: 0.14em; text-transform: uppercase;
    background: rgba(255, 255, 255, 0.02);
    position: sticky; top: 0;
  }
  table.tbl tr:last-child td { border-bottom: 0; }
  table.tbl tr:hover { background: rgba(124, 77, 255, 0.03); }
  table.tbl td.mono {
    font-family: 'SF Mono', Menlo, monospace;
    font-size: 11px; color: var(--dim);
  }
  .pill {
    display: inline-block;
    padding: 3px 9px; border-radius: 999px;
    font-size: 10px; letter-spacing: 0.1em;
    text-transform: uppercase; font-weight: 700;
  }
  .pill.opt-in { background: rgba(124, 77, 255, 0.16); color: var(--accent-bright); }
  .pill.paid { background: rgba(34, 197, 94, 0.16); color: var(--good); }

  .empty-state {
    padding: 60px 20px; text-align: center;
  }
  .empty-state .ic {
    width: 56px; height: 56px;
    border-radius: 50%;
    background: var(--surface-2);
    display: inline-flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 22px;
    margin-bottom: 14px;
  }
  .empty-state h4 {
    font-size: 16px; margin: 0 0 6px;
    letter-spacing: -0.01em; font-weight: 700;
  }
  .empty-state p { color: var(--dim); font-size: 13px; margin: 0; max-width: 360px; margin-left: auto; margin-right: auto; }

  /* Search */
  .search {
    display: flex; gap: 0; max-width: 320px; flex: 1;
  }
  .search input {
    flex: 1; padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-radius: 10px;
    color: var(--text); font-family: inherit; font-size: 13px;
    -webkit-appearance: none;
  }
  .search input:focus {
    outline: none; border-color: var(--accent-bright);
    box-shadow: 0 0 0 3px rgba(124, 77, 255, 0.18);
  }

  .right-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
</style>
{% block head %}{% endblock %}
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="brand">Lumen · SCE</div>

    <div class="nav-section">
      <div class="nav-label">Offers</div>
      <a class="nav-item {{ 'active' if offer_id == 'mothersday' else '' }}" href="{{ url_for('sce_admin.md_metrics') }}">
        <span class="dot"></span>
        <span>Mother's Day</span>
      </a>
    </div>

    <div class="sidebar-foot">
      <div class="who">{{ session.get('sce_admin', '') }}</div>
      <a href="{{ url_for('sce_admin.logout') }}">Sign out</a>
    </div>
  </aside>

  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
{% block scripts %}{% endblock %}
</body>
</html>
