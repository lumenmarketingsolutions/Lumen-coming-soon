<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#080809">
  <title>Sign in — MK7 CRM</title>
  <link rel="icon" href="/static/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --teal: #128fc4;
      --teal-light: #1aabe8;
      --dark: #080809;
      --dark-card: #111114;
      --dark-border: #1c1c24;
      --text: #e8e8f0;
      --text-dim: #8b8ba0;
      --text-muted: #56566a;
      --red: #f87171;
    }
    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--dark); color: var(--text);
      -webkit-font-smoothing: antialiased;
      min-height: 100vh;
      display: flex; align-items: center; justify-content: center;
      padding: 24px;
      position: relative;
      overflow-x: hidden;
    }
    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(800px circle at 20% 20%, rgba(18,143,196,0.10), transparent 50%),
        radial-gradient(700px circle at 80% 80%, rgba(128,47,222,0.08), transparent 50%);
      pointer-events: none;
      z-index: 0;
    }
    .wrap { position: relative; z-index: 1; width: 100%; max-width: 420px; }
    .brand {
      display: flex; flex-direction: column; align-items: center;
      margin-bottom: 28px;
    }
    .lockup {
      display: inline-flex; align-items: center; gap: 14px;
      margin-bottom: 16px;
    }
    .lockup img { height: 22px; opacity: 0.92; }
    .lockup .x {
      font-size: 14px; font-weight: 400; color: var(--text-muted);
      letter-spacing: 0;
    }
    .lockup .mk7 {
      font-size: 22px; font-weight: 800; letter-spacing: -0.5px;
      color: #fff;
    }
    .brand .title { font-size: 22px; font-weight: 800; letter-spacing: -0.4px; }
    .brand .sub {
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 2px; text-transform: uppercase;
      margin-top: 4px;
    }
    .card {
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-radius: 18px;
      padding: 32px 28px 26px;
      box-shadow: 0 24px 60px rgba(0,0,0,0.4);
    }
    .card h1 {
      font-size: 18px; font-weight: 700;
      margin-bottom: 4px;
      text-align: center;
    }
    .card p.intro {
      font-size: 13px; color: var(--text-dim);
      text-align: center; line-height: 1.55;
      margin-bottom: 20px;
    }
    .form-row { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 11px; font-weight: 600;
      letter-spacing: 1.5px; text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 6px;
    }
    .form-input {
      width: 100%; padding: 12px 14px;
      background: var(--dark);
      border: 1px solid var(--dark-border);
      border-radius: 10px;
      color: var(--text); font-size: 16px;   /* 16px = no iOS zoom */
      font-family: inherit;
      outline: none;
      transition: border-color .15s, background .15s;
    }
    .form-input:focus { border-color: var(--teal); background: #0a0a0c; }
    .form-input::placeholder { color: var(--text-muted); }
    .submit-btn {
      width: 100%; padding: 13px;
      background: var(--teal); color: white;
      border: none; border-radius: 10px;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
      margin-top: 6px;
    }
    .submit-btn:hover { background: var(--teal-light); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }
    .error {
      background: rgba(248,113,113,0.08);
      border: 1px solid rgba(248,113,113,0.25);
      color: #f5b9b9;
      padding: 12px 14px; border-radius: 10px;
      font-size: 13px; line-height: 1.5;
      margin-bottom: 16px;
    }
    .foot {
      margin-top: 22px; text-align: center;
      font-size: 11px; color: var(--text-muted);
      letter-spacing: 0.4px;
      line-height: 1.6;
    }
    .powered {
      display: inline-flex; align-items: center; gap: 6px;
      margin-top: 14px; font-size: 10px; color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .powered img { height: 12px; opacity: 0.5; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="brand">
      <div class="lockup">
        <img src="/static/logo-lumen.svg" alt="Lumen">
        <span class="x">×</span>
        <span class="mk7">MK7</span>
      </div>
      <div class="title">Setter CRM</div>
      <div class="sub">Lead tracking · Calendar</div>
    </div>
    <div class="card">
      <h1>Sign in</h1>
      <p class="intro">Use the email and password your admin gave you.<br>Sessions stay signed in for 60 days.</p>

      {% if error %}<div class="error">{{ error }}</div>{% endif %}

      <form method="post" action="/crm/login" autocomplete="on">
        <input type="hidden" name="next" value="{{ next or '/crm/leads' }}">
        <div class="form-row">
          <label class="form-label" for="email">Email</label>
          <input class="form-input" type="email" name="email" id="email" required autocomplete="username" autofocus>
        </div>
        <div class="form-row">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" name="password" id="password" required autocomplete="current-password">
        </div>
        <button class="submit-btn" type="submit">Sign in</button>
      </form>

      <div class="foot">
        Forgot your password? Ask an admin to reset it for you.
      </div>
    </div>

    <div style="text-align:center">
      <div class="powered">
        Powered by
        <img src="/static/logo-lumen.svg" alt="Lumen">
        Lumen Marketing
      </div>
    </div>
  </div>
</body>
</html>
