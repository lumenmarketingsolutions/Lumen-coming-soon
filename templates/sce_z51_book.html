<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Pick a date · Corvette C8 Z51 · SCE Boise</title>
<meta name="description" content="Pick a date and time for your Z51 booking.">
<link rel="icon" href="data:,">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFFFFF; --surface: #FFFFFF;
    --surface-muted: #FAFAFB;
    --text: #1A1A1A; --muted: #5C5C5C;
    --accent: #ff4d00; --accent-dark: #d94100;
    --accent-soft: rgba(255, 77, 0, 0.08);
    --line: rgba(26, 26, 26, 0.07);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; height: 100%; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    /* Use full dynamic viewport height so iOS Safari toolbars don't crop */
    height: 100vh;
    height: 100dvh;
    overflow: hidden;
    display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }

  /* ─── Header (matches landing/info pages) ─── */
  .nav {
    background: var(--surface);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .nav-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 14px 22px;
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    min-height: 56px;
  }
  .nav-logo {
    display: inline-flex; align-items: center;
    flex: 0 0 auto;
  }
  .nav-logo img {
    height: 24px; width: auto; display: block;
    filter: brightness(0); opacity: 0.92;
  }
  .nav-back {
    color: var(--muted); font-size: 13px; font-weight: 500;
    white-space: nowrap;
    padding: 6px 10px 6px 4px;
    margin-left: -4px;
    display: inline-flex; align-items: center; gap: 4px;
    flex: 0 0 auto;
  }
  .nav-back::before { content: '←'; font-size: 16px; }
  .nav-back:hover { color: var(--text); }
  @media (max-width: 540px) {
    .nav-inner { padding: 12px 16px; gap: 10px; min-height: 52px; }
    .nav-logo img { height: 20px; }
    .nav-back { font-size: 12.5px; }
  }
  @media (max-width: 380px) {
    .nav-logo img { height: 18px; }
  }

  /* ─── Summary band (compact, just above the iframe) ─── */
  .summary-band {
    background: var(--surface-muted);
    border-bottom: 1px solid var(--line);
    flex: 0 0 auto;
  }
  .summary-inner {
    max-width: 760px;
    margin: 0 auto;
    padding: 10px 22px;
    display: flex; align-items: center; gap: 12px;
  }
  .summary-label {
    font-size: 10.5px; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--accent);
    font-weight: 700;
    flex: 0 0 auto;
  }
  .summary-text {
    font-size: 13.5px; font-weight: 600;
    color: var(--text);
    flex: 1; min-width: 0;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .summary-price {
    font-size: 16px; font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.01em;
    font-feature-settings: "tnum" 1;
    flex: 0 0 auto;
  }
  @media (max-width: 540px) {
    .summary-inner { padding: 8px 16px; gap: 10px; }
    .summary-label { display: none; }
    .summary-text { font-size: 13px; }
    .summary-price { font-size: 15px; }
  }

  /* ─── Iframe shell — fills the remaining viewport ─── */
  .iframe-wrap {
    flex: 1 1 auto;
    width: 100%;
    overflow: hidden;
    background: #fff;
    position: relative;
  }
  .iframe-wrap iframe {
    width: 100%;
    height: 100%;
    border: 0;
    display: block;
  }
  .iframe-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface-muted);
    color: var(--muted); font-size: 13px;
    letter-spacing: 0.08em; text-transform: uppercase;
    pointer-events: none;
    transition: opacity 240ms ease-out;
  }
  .iframe-loading.hidden { opacity: 0; }
  .iframe-loading .spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(26,26,26,0.12);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.9s linear infinite;
    margin-right: 10px;
  }
  @keyframes spin {
    to { transform: rotate(360deg); }
  }
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/z51" class="nav-logo" aria-label="Supercar Experience Boise">
      <img src="{{ url_for('static', filename='sce-z51/logo.webp') }}" alt="Supercar Experience Boise">
    </a>
    <a class="nav-back" href="javascript:history.back()">Back</a>
  </div>
</nav>

<div class="summary-band">
  <div class="summary-inner">
    <span class="summary-label">Booking</span>
    <span class="summary-text">Corvette C8 Z51 · {{ duration.label }}</span>
    <span class="summary-price">${{ '{:,}'.format(duration.price) }}</span>
  </div>
</div>

<div class="iframe-wrap">
  <div class="iframe-loading" id="ifLoading">
    <span class="spinner"></span>
    <span>Loading availability…</span>
  </div>
  <iframe
    src="{{ valara_url }}"
    title="Pick a date and time"
    loading="eager"
    referrerpolicy="strict-origin-when-cross-origin"
    allow="payment"
    onload="document.getElementById('ifLoading').classList.add('hidden');"
  ></iframe>
</div>

<script>
  // Failsafe — hide the loading state after 6s even if onload didn't fire
  setTimeout(function() {
    var el = document.getElementById('ifLoading');
    if (el) el.classList.add('hidden');
  }, 6000);
</script>

</body>
</html>
