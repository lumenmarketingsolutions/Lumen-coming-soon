<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>New Signup</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;800&display=swap');
    body { margin:0; padding:0; }
    img { border:0; display:block; }
  </style>
</head>
<body bgcolor="#ffffff" style="margin:0;padding:0;background-color:#ffffff;">
<center>
<table border="0" cellpadding="0" cellspacing="0" width="100%" bgcolor="#ffffff" style="background-color:#ffffff;border-collapse:collapse;">

  <!-- Top spacing -->
  <tr><td height="44" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Logo -->
  <tr>
    <td align="center">
      <img src="https://lumenmarketing.co/static/logo-white.png" alt="Lumen" height="36" style="height:36px;width:auto;">
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="36" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Purple line -->
  <tr>
    <td align="center">
      <table border="0" cellpadding="0" cellspacing="0" width="48"><tr><td bgcolor="#6128DB" height="1" style="background-color:#6128DB;font-size:1px;line-height:1px;">&nbsp;</td></tr></table>
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="32" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Headline -->
  <tr>
    <td align="center" style="font-family:'Inter',Arial,Helvetica,sans-serif;font-size:34px;font-weight:800;letter-spacing:-1.5px;line-height:1.1;color:#0a0a0f;">
      New signup<span style="color:#6128DB;">.</span>
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="24" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Body copy -->
  <tr>
    <td align="center" style="font-family:'Inter',Arial,Helvetica,sans-serif;font-size:15px;line-height:1.75;color:#6b6b80;padding:0 32px;">
      Someone just requested access on the coming soon page.
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="32" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Email display -->
  <tr>
    <td align="center" style="font-family:'Inter',Arial,Helvetica,sans-serif;font-size:18px;font-weight:600;letter-spacing:-0.5px;color:#0a0a0f;">
      {{ email }}
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="40" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Purple line -->
  <tr>
    <td align="center">
      <table border="0" cellpadding="0" cellspacing="0" width="48"><tr><td bgcolor="#6128DB" height="1" style="background-color:#6128DB;font-size:1px;line-height:1px;">&nbsp;</td></tr></table>
    </td>
  </tr>

  <!-- Spacer -->
  <tr><td height="32" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

  <!-- Footer -->
  <tr>
    <td align="center" style="font-family:'Inter',Arial,Helvetica,sans-serif;font-size:11px;letter-spacing:0.5px;color:#a0a0b0;">
      Coming Soon Page — Internal Notification
    </td>
  </tr>

  <!-- Bottom spacing -->
  <tr><td height="56" style="font-size:1px;line-height:1px;">&nbsp;</td></tr>

</table>
</center>
</body>
</html>
