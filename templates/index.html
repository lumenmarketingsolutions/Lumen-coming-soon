<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumen — Coming Soon</title>
  <meta name="description" content="A system that turns strangers into paying customers while you sleep.">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://lumenmarketing.co">
  <meta property="og:title" content="Lumen">
  <meta property="og:description" content="A system that turns strangers into paying customers while you sleep.">
  <meta property="og:image" content="https://lumenmarketing.co/static/og-image.png">
  <meta property="og:image:width" content="1200">
  <meta property="og:image:height" content="630">
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Lumen">
  <meta name="twitter:description" content="A system that turns strangers into paying customers while you sleep.">
  <meta name="twitter:image" content="https://lumenmarketing.co/static/og-image.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

    :root {
      --purple: #6128DB;
      --purple-light: #7c4dff;
      --purple-glow: rgba(97,40,219,0.35);
      --dark: #0a0a0f;
      --dark-card: #111118;
      --dark-border: #1a1a25;
      --text: #e8e8f0;
      --text-dim: #6b6b80;
      --text-muted: #44445a;
    }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--dark);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Animated background ── */
    .bg-grid {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-grid::before {
      content: '';
      position: absolute;
      inset: -50%;
      background-image:
        linear-gradient(rgba(97,40,219,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(97,40,219,0.03) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 20s linear infinite;
    }

    @keyframes gridDrift {
      0% { transform: translate(0, 0) rotate(0deg); }
      100% { transform: translate(30px, 60px) rotate(0.5deg); }
    }

    /* Orb glows */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.4;
      z-index: 0;
      pointer-events: none;
    }

    .orb-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, var(--purple-glow), transparent 70%);
      top: -10%; left: -10%;
      animation: orbFloat1 12s ease-in-out infinite;
    }

    .orb-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(124,77,255,0.2), transparent 70%);
      bottom: -5%; right: -8%;
      animation: orbFloat2 15s ease-in-out infinite;
    }

    .orb-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(97,40,219,0.15), transparent 70%);
      top: 40%; left: 50%;
      animation: orbFloat3 18s ease-in-out infinite;
    }

    @keyframes orbFloat1 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(40px, 30px) scale(1.1); }
      66% { transform: translate(-20px, 50px) scale(0.95); }
    }

    @keyframes orbFloat2 {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(-30px, -40px) scale(1.05); }
      66% { transform: translate(20px, -20px) scale(0.9); }
    }

    @keyframes orbFloat3 {
      0%, 100% { transform: translate(-50%, 0) scale(1); opacity: 0.3; }
      50% { transform: translate(-50%, -30px) scale(1.15); opacity: 0.5; }
    }

    /* ── Main content ── */
    .page {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      padding: 24px;
    }

    /* Logo / brand */
    .brand {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease 0.2s forwards;
    }

    .brand-logo {
      height: 48px;
      width: auto;
      object-fit: contain;
    }

    /* Headline */
    .headline {
      text-align: center;
      margin-bottom: 24px;
      opacity: 0;
      animation: fadeUp 1s ease 0.5s forwards;
    }

    .headline h1 {
      font-size: clamp(40px, 8vw, 80px);
      font-weight: 800;
      line-height: 1.05;
      letter-spacing: -2px;
      background: linear-gradient(135deg, #ffffff 0%, #c0c0d0 50%, var(--purple-light) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .headline .dot {
      display: inline-block;
      width: 10px;
      height: 10px;
      background: var(--purple);
      border-radius: 50%;
      margin-left: 4px;
      vertical-align: baseline;
      position: relative;
      top: -8px;
      -webkit-text-fill-color: initial;
      animation: dotPulse 2s ease-in-out infinite;
    }

    @keyframes dotPulse {
      0%, 100% { box-shadow: 0 0 0 0 var(--purple-glow); }
      50% { box-shadow: 0 0 0 8px rgba(97,40,219,0); }
    }

    /* Subline */
    .subline {
      text-align: center;
      font-size: clamp(15px, 2.2vw, 17px);
      color: var(--text-dim);
      line-height: 1.6;
      max-width: 440px;
      margin-bottom: 20px;
      opacity: 0;
      animation: fadeUp 1s ease 0.8s forwards;
    }

    /* Waitlist form */
    .waitlist {
      display: flex;
      align-items: stretch;
      gap: 0;
      width: 100%;
      max-width: 460px;
      margin-bottom: 48px;
      opacity: 0;
      animation: fadeUp 1s ease 1.1s forwards;
      position: relative;
    }

    .waitlist input {
      flex: 1;
      padding: 16px 20px;
      background: var(--dark-card);
      border: 1px solid var(--dark-border);
      border-right: none;
      border-radius: 12px 0 0 12px;
      color: var(--text);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.3s, box-shadow 0.3s;
    }

    .waitlist input::placeholder {
      color: var(--text-muted);
    }

    .waitlist input:-webkit-autofill,
    .waitlist input:-webkit-autofill:hover,
    .waitlist input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px var(--dark-card) inset;
      -webkit-text-fill-color: var(--text);
      -webkit-text-decoration: none;
      text-decoration: none;
      caret-color: var(--text);
    }

    .waitlist input:focus {
      border-color: var(--purple);
      box-shadow: 0 0 0 3px rgba(97,40,219,0.15);
    }

    .waitlist button {
      padding: 16px 28px;
      background: linear-gradient(135deg, var(--purple), var(--purple-light));
      border: none;
      border-radius: 0 12px 12px 0;
      color: white;
      font-size: 14px;
      font-weight: 600;
      font-family: inherit;
      letter-spacing: 0.5px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.3s;
      white-space: nowrap;
    }

    .waitlist button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 30px var(--purple-glow);
    }

    .waitlist button:active {
      transform: translateY(0);
    }

    .waitlist-msg {
      position: absolute;
      bottom: -32px;
      left: 0;
      right: 0;
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      opacity: 0;
      transition: opacity 0.3s;
    }

    .waitlist-msg.show { opacity: 1; }
    .waitlist-msg.ok { color: var(--purple-light); }
    .waitlist-msg.err { color: #ef4444; }

    /* Bottom features strip */
    .signals {
      display: flex;
      align-items: center;
      gap: 32px;
      opacity: 0;
      animation: fadeUp 1s ease 1.4s forwards;
    }

    .signal {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      color: var(--text-muted);
    }

    .signal-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--purple);
      animation: signalBlink 2.5s ease-in-out infinite;
    }

    .signal:nth-child(2) .signal-dot { animation-delay: 0.8s; }
    .signal:nth-child(3) .signal-dot { animation-delay: 1.6s; }

    .signal-dot-green {
      background: #22c55e;
      animation-name: signalBlinkGreen;
    }

    @keyframes signalBlink {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    @keyframes signalBlinkGreen {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }

    /* Particles */
    .particle {
      position: fixed;
      width: 2px;
      height: 2px;
      background: var(--purple);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0;
    }

    /* Drop date */
    .drop-date {
      text-align: center;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--purple-light);
      margin-bottom: 52px;
      opacity: 0;
      animation: fadeUp 1s ease 0.95s forwards;
    }

    /* ── Animations ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ── Success state ── */
    .waitlist.success input {
      border-color: var(--purple);
      background: rgba(97,40,219,0.08);
      text-decoration: none;
      -webkit-text-decoration: none;
      opacity: 1;
      -webkit-text-fill-color: var(--text);
      color: var(--text);
    }

    .waitlist.success button {
      background: linear-gradient(135deg, #22c55e, #16a34a);
      pointer-events: none;
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .headline h1 { letter-spacing: -1px; }

      .waitlist {
        flex-direction: column;
        gap: 10px;
      }

      .waitlist input {
        border-right: 1px solid var(--dark-border);
        border-radius: 12px;
      }

      .waitlist button {
        border-radius: 12px;
        padding: 14px 28px;
      }

      .waitlist-msg { bottom: -28px; }

      .signals {
        gap: 24px;
      }

      .brand { margin-bottom: 48px; }
      .subline { margin-bottom: 40px; }
    }
  </style>
</head>
<body>
  <!-- Background effects -->
  <div class="bg-grid"></div>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>

  <div class="page">
    <!-- Brand -->
    <div class="brand">
      <img src="{{ url_for('static', filename='logo-white.png') }}" alt="Lumen" class="brand-logo">
    </div>

    <!-- Subline -->
    <p class="subline">
      A system that turns strangers into paying customers while you sleep.
    </p>

    <!-- Drop date -->
    <p class="drop-date">03 . 23 . 2026</p>

    <!-- Waitlist -->
    <form class="waitlist" id="waitlist-form" onsubmit="return joinWaitlist(event)">
      <input type="email" id="waitlist-email" placeholder="Enter your email" required autocomplete="email">
      <button type="submit" id="waitlist-btn">Request Access</button>
      <div class="waitlist-msg" id="waitlist-msg"></div>
    </form>

    <!-- Signal strip -->
    <div class="signals">
      <div class="signal"><span class="signal-dot"></span> AI-Powered</div>
      <div class="signal"><span class="signal-dot"></span> Full-Stack Marketing</div>
    </div>
  </div>

  <!-- Floating particles -->
  <canvas id="particles" style="position:fixed;inset:0;z-index:0;pointer-events:none;"></canvas>

  <script>
    // ── Particle system ──
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const COUNT = 40;

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      class Particle {
        constructor() { this.reset(); }
        reset() {
          this.x = Math.random() * canvas.width;
          this.y = Math.random() * canvas.height;
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = -Math.random() * 0.4 - 0.1;
          this.size = Math.random() * 1.5 + 0.5;
          this.opacity = Math.random() * 0.4 + 0.1;
          this.life = Math.random() * 200 + 100;
          this.maxLife = this.life;
        }
        update() {
          this.x += this.vx;
          this.y += this.vy;
          this.life--;
          if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > canvas.width + 10) {
            this.reset();
            this.y = canvas.height + 10;
          }
        }
        draw() {
          const fade = Math.min(this.life / 30, (this.maxLife - this.life) / 30, 1);
          ctx.globalAlpha = this.opacity * fade;
          ctx.fillStyle = '#6128DB';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        particles.forEach(p => { p.update(); p.draw(); });

        // Draw connections
        ctx.strokeStyle = '#6128DB';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 120) {
              ctx.globalAlpha = (1 - dist / 120) * 0.08;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }
        requestAnimationFrame(animate);
      }
      animate();
    })();

    // ── Waitlist ──
    function joinWaitlist(e) {
      e.preventDefault();
      const email = document.getElementById('waitlist-email').value.trim();
      const msg = document.getElementById('waitlist-msg');
      const btn = document.getElementById('waitlist-btn');
      const form = document.getElementById('waitlist-form');

      btn.textContent = '...';
      btn.disabled = true;

      fetch('/join', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: email })
      })
      .then(r => r.json())
      .then(data => {
        if (data.ok) {
          msg.textContent = "You\u2019re on the list. We\u2019ll be in touch.";
          msg.className = 'waitlist-msg show ok';
          btn.textContent = '\u2713';
          form.classList.add('success');
          document.getElementById('waitlist-email').disabled = true;
          document.getElementById('waitlist-email').blur();
          window.scrollTo(0, 0);
        } else {
          msg.textContent = data.error || 'Something went wrong';
          msg.className = 'waitlist-msg show err';
          btn.textContent = 'Get Early Access';
          btn.disabled = false;
        }
      })
      .catch(() => {
        msg.textContent = 'Connection error. Try again.';
        msg.className = 'waitlist-msg show err';
        btn.textContent = 'Get Early Access';
        btn.disabled = false;
      });

      return false;
    }

    // ── Page analytics ──
    (function() {
      var sid = null;
      var start = Date.now();
      fetch('/t/view', { method: 'POST' })
        .then(function(r) { return r.json(); })
        .then(function(d) { sid = d.sid; });

      function ping() {
        if (!sid) return;
        var t = Math.round((Date.now() - start) / 1000);
        navigator.sendBeacon('/t/ping', JSON.stringify({ sid: sid, t: t }));
      }

      setInterval(function() {
        if (sid) {
          var t = Math.round((Date.now() - start) / 1000);
          fetch('/t/ping', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ sid: sid, t: t })
          });
        }
      }, 5000);

      document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'hidden') ping();
      });
      window.addEventListener('beforeunload', ping);
    })();
  </script>
</body>
</html>
