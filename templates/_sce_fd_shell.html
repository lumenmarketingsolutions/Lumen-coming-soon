{# Shared shell for every Father's Day step page.
   Each step template includes this partial via {% include %} inside its <head>. #}
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FAF7F2; --surface: #FFFFFF;
    --text: #1A1A1A; --muted: #5C5C5C;
    --accent: #ff4d00; --accent-dark: #d94100;
    --accent-soft: rgba(255, 77, 0, 0.08);
    --accent-mid: rgba(255, 77, 0, 0.18);
    --line: rgba(26, 26, 26, 0.08);
    --line-strong: rgba(26, 26, 26, 0.18);
  }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    font-size: 16px; line-height: 1.55;
    -webkit-font-smoothing: antialiased;
    min-height: 100vh;
    display: flex; flex-direction: column;
    animation: page-fade-in 240ms ease-out both;
  }
  /* Opacity-only fade — no transform. A translateY on the body promotes it to
     a compositor layer, which causes Chrome to flash/glitch on desktop during
     the cross-page render. Same bug we hit on the Z51 funnel. */
  @keyframes page-fade-in {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
  img { max-width: 100%; display: block; }
  a { color: inherit; text-decoration: none; }
  button { font-family: inherit; }

  /* ─── Topbar with live Father's Day countdown ─── */
  .topbar {
    background: #0F0F0F;
    color: #fff;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .topbar-inner {
    max-width: 1080px; margin: 0 auto;
    padding: 11px 22px;
    display: flex; align-items: center; justify-content: center;
    gap: 16px;
  }
  .topbar-countdown {
    display: inline-flex; align-items: center; gap: 9px;
    font-size: 12px; letter-spacing: 0.06em;
    color: rgba(255,255,255,0.78); font-weight: 600;
    white-space: nowrap;
    font-feature-settings: "tnum" 1;
    text-transform: uppercase;
  }
  .cd-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 0 0 rgba(255, 77, 0, 0.55);
    animation: cd-pulse 1.8s ease-out infinite;
    flex: 0 0 7px;
  }
  @keyframes cd-pulse {
    0%   { box-shadow: 0 0 0 0   rgba(255, 77, 0, 0.55); }
    70%  { box-shadow: 0 0 0 10px rgba(255, 77, 0, 0); }
    100% { box-shadow: 0 0 0 0   rgba(255, 77, 0, 0); }
  }
  .cd-text { color: #fff; font-weight: 700; }
  .cd-text .cd-num { color: var(--accent); font-weight: 800; }
  @media (max-width: 640px) {
    .topbar-inner { padding: 10px 16px; gap: 10px; }
    .topbar-countdown { font-size: 11px; gap: 7px; letter-spacing: 0.04em; }
    .cd-dot { width: 6px; height: 6px; flex: 0 0 6px; }
  }
  @media (max-width: 420px) {
    .topbar-countdown { font-size: 10.5px; }
  }

  .nav {
    padding: 12px 16px;
    display: flex; align-items: center; justify-content: space-between;
    border-bottom: 1px solid var(--line);
    gap: 10px;
    background: var(--surface);
  }

  /* ─── Logo (top-left brand mark, matches Z51 funnel pattern) ─── */
  .fd-logo {
    flex: 0 0 auto;
    display: inline-flex;
    align-items: center;
    line-height: 0;
  }
  .fd-logo img {
    height: 44px;
    width: auto;          /* preserve the logo's natural wide aspect ratio */
    max-width: 180px;
    object-fit: contain;
    display: block;
    /* Source logo is white-on-transparent (designed for dark backgrounds).
       FD nav is white, so invert to black so the mark actually shows. */
    filter: brightness(0);
  }
  .fd-spacer { flex: 0 0 180px; }

  /* ─── Brand row (FD label and wordmark inline, centered together) ─── */
  .fd-brand {
    flex: 1 1 auto;
    display: flex;
    flex-direction: row;
    align-items: center;
    justify-content: center;
    gap: 12px;
    min-width: 0;
  }
  /* Override the shell's wordmark flex-grow when it's nested inside the brand
     row — otherwise the wordmark expands to fill all remaining horizontal
     space, pushing the label flush-left and the wordmark text flush-right
     with a lonely divider stranded in the middle. */
  .fd-brand .wordmark {
    flex: 0 0 auto;
    text-align: left;
  }
  .fd-label {
    font-size: 12px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    font-weight: 700;
    white-space: nowrap;
  }
  .fd-label strong {
    color: var(--accent);
    font-weight: 700;
  }
  .fd-divider {
    color: var(--line-strong);
    font-weight: 700;
    font-size: 12px;
    user-select: none;
  }
  @media (max-width: 540px) {
    .fd-logo img { height: 32px; max-width: 130px; }
    .fd-spacer  { flex: 0 0 130px; }
    .fd-brand   { gap: 9px; }
    .fd-label   { font-size: 10px; letter-spacing: 0.1em; }
  }
  @media (max-width: 400px) {
    /* On tight phones drop the FD label and keep just the wordmark to avoid wrap */
    .fd-divider, .fd-label { display: none; }
  }
  .back {
    color: var(--muted); font-size: 13px; font-weight: 500;
    white-space: nowrap; padding: 6px 10px 6px 4px;
    margin-left: -4px;
    display: inline-flex; align-items: center; gap: 4px;
    flex: 0 0 auto;
    min-width: 0;
  }
  .back::before { content: '←'; font-size: 16px; }
  .back-placeholder { width: 24px; flex: 0 0 auto; }
  .wordmark {
    font-size: 12px; letter-spacing: 0.14em; text-transform: uppercase;
    font-weight: 700; white-space: nowrap;
    text-align: center;
    flex: 1 1 auto;
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .wordmark .dot { color: var(--accent); }
  .step-pill {
    background: var(--accent-soft); color: var(--accent);
    font-size: 11px; font-weight: 700; letter-spacing: 0.12em;
    text-transform: uppercase; padding: 5px 10px; border-radius: 999px;
    white-space: nowrap;
    flex: 0 0 auto;
  }
  /* Responsive swap: long form on desktop, short form on phones */
  .wm-short, .sp-short { display: none; }
  @media (max-width: 540px) {
    .nav { padding: 11px 12px; gap: 8px; }
    .back { font-size: 12.5px; padding: 6px 6px 6px 2px; }
    .wm-long, .sp-long { display: none; }
    .wm-short, .sp-short { display: inline; }
    .wordmark { font-size: 11px; letter-spacing: 0.1em; }
    .step-pill { font-size: 10.5px; padding: 4px 9px; letter-spacing: 0.06em; }
  }
  @media (max-width: 360px) {
    .wordmark { font-size: 10.5px; letter-spacing: 0.08em; }
    .step-pill { font-size: 10px; padding: 4px 8px; letter-spacing: 0.04em; }
  }

  /* Progress bar */
  .progress {
    height: 3px; background: var(--line);
    width: 100%; overflow: hidden;
  }
  .progress-fill {
    height: 100%; background: var(--accent);
    transition: width 320ms cubic-bezier(0.16, 1, 0.3, 1);
  }

  /* Main wrap */
  .wrap {
    flex: 1;
    width: 100%;
    max-width: 640px;
    margin: 0 auto;
    padding: 30px 20px 40px;
  }

  /* Hero */
  .hero { text-align: center; margin-bottom: 26px; }
  .hero-eyebrow {
    color: var(--accent);
    font-size: 11px; letter-spacing: 0.22em;
    text-transform: uppercase; font-weight: 700;
    margin-bottom: 12px;
  }
  .hero-title {
    font-size: clamp(26px, 6.5vw, 36px);
    line-height: 1.12; letter-spacing: -0.02em;
    font-weight: 800;
    margin: 0 0 12px;
  }
  .hero-sub {
    color: var(--muted); font-size: clamp(14px, 3.5vw, 16px);
    line-height: 1.5; margin: 0 auto;
    max-width: 460px;
  }

  /* Generic chip (used for durations + gift card amounts) */
  .chips { display: grid; gap: 12px; }
  .chips.two   { grid-template-columns: repeat(2, 1fr); }
  .chips.three { grid-template-columns: repeat(3, 1fr); }
  .chip {
    background: var(--surface);
    border: 2px solid var(--line);
    border-radius: 14px;
    padding: 20px 14px;
    cursor: pointer;
    text-align: center;
    transition: border-color 0.15s, background 0.15s, transform 0.15s, box-shadow 0.18s;
    font-weight: 700; font-size: 17px;
    color: var(--text);
    line-height: 1.2;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 76px;
  }
  .chip:active { transform: scale(0.985); }
  .chip:hover { border-color: var(--line-strong); }
  .chip.selected, .chip.is-selected {
    border-color: var(--accent);
    background: var(--accent);
    color: #fff;
    box-shadow: 0 6px 18px rgba(255, 77, 0, 0.18);
  }
  .chip .sub {
    font-size: 12px; font-weight: 500;
    color: var(--muted);
    margin-top: 5px;
    letter-spacing: 0;
  }
  .chip.selected .sub, .chip.is-selected .sub { color: rgba(255,255,255,0.85); }

  /* "Skip" chip — smaller, ghost style */
  .skip-row { margin-top: 14px; text-align: center; }
  .skip-link {
    display: inline-block;
    color: var(--muted); font-size: 14px; font-weight: 500;
    padding: 12px 18px;
    border-radius: 10px;
    text-decoration: none;
    border: 1px solid var(--line);
    background: transparent;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
    cursor: pointer;
  }
  .skip-link:hover { border-color: var(--line-strong); color: var(--text); }
  .skip-link:active { transform: scale(0.985); }

  /* Footer */
  footer {
    padding: 24px 22px;
    text-align: center;
    color: var(--muted); font-size: 12px;
    border-top: 1px solid var(--line);
    margin-top: 30px;
    background: var(--surface);
  }
  footer a { color: var(--muted); margin: 0 8px; }
  .phone-cta { color: var(--text); font-weight: 600; font-size: 14px; }

  /* Notice / error banner */
  .notice {
    background: var(--accent-soft);
    border: 1px solid var(--accent-mid);
    color: var(--accent-dark);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 13px;
    margin: 16px auto 0;
    max-width: 600px;
    line-height: 1.5;
  }
</style>
<script>
  // Father's Day countdown — Sunday June 21, 2026 at midnight Boise time.
  (function() {
    // Boise is Mountain Time (UTC-6 with DST, currently MDT)
    var FD = new Date('2026-06-21T00:00:00-06:00').getTime();
    function render() {
      var el = document.getElementById('fdCountdown');
      if (!el) return;
      var textEl = el.querySelector('.cd-text');
      if (!textEl) return;
      var diff = FD - Date.now();
      if (diff <= 0) {
        textEl.innerHTML = "It's Father's Day!";
        return;
      }
      var d = Math.floor(diff / 86400000);
      var h = Math.floor((diff / 3600000) % 24);
      var m = Math.floor((diff / 60000) % 60);
      var s = Math.floor((diff / 1000) % 60);
      var parts;
      if (d > 0) {
        parts = '<span class="cd-num">' + d + 'd</span> ' +
                '<span class="cd-num">' + h + 'h</span> ' +
                '<span class="cd-num">' + m + 'm</span> left';
      } else if (h > 0) {
        parts = '<span class="cd-num">' + h + 'h</span> ' +
                '<span class="cd-num">' + m + 'm</span> ' +
                '<span class="cd-num">' + s + 's</span> left';
      } else {
        parts = '<span class="cd-num">' + m + 'm</span> ' +
                '<span class="cd-num">' + s + 's</span> left';
      }
      textEl.innerHTML = parts;
    }
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() {
        render();
        setInterval(render, 1000);
      });
    } else {
      render();
      setInterval(render, 1000);
    }
  })();
</script>
