<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lumen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      font-family:'Inter', -apple-system, sans-serif;
      background:#0a0a0f; color:#e8e8f0;
      -webkit-font-smoothing:antialiased;
    }

    /* Ambient orb glows — very slow drift, no pulsing/scaling */
    .orb {
      position:fixed; border-radius:50%;
      filter:blur(120px); pointer-events:none;
    }
    .orb-1 {
      width:60vw; height:60vw;
      background:radial-gradient(circle, rgba(97,40,219,0.25), transparent 70%);
      top:-15%; left:-20%;
      animation:orbDrift1 30s ease-in-out infinite;
    }
    .orb-2 {
      width:50vw; height:50vw;
      background:radial-gradient(circle, rgba(124,77,255,0.15), transparent 70%);
      bottom:-10%; right:-15%;
      animation:orbDrift2 35s ease-in-out infinite;
    }
    .orb-3 {
      width:35vw; height:35vw;
      background:radial-gradient(circle, rgba(97,40,219,0.12), transparent 70%);
      top:40%; left:45%;
      animation:orbDrift3 40s ease-in-out infinite;
    }
    /* Very gentle position drift only — no scale, no opacity change */
    @keyframes orbDrift1 {
      0%, 100% { transform:translate(0, 0); }
      50% { transform:translate(30px, 20px); }
    }
    @keyframes orbDrift2 {
      0%, 100% { transform:translate(0, 0); }
      50% { transform:translate(-20px, -15px); }
    }
    @keyframes orbDrift3 {
      0%, 100% { transform:translate(-50%, 0); }
      50% { transform:translate(-50%, -15px); }
    }

    /* Particle canvas */
    #particles {
      position:fixed; inset:0; z-index:1;
    }

    /* Content */
    .content {
      position:fixed; inset:0; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px;
      text-align:center;
    }
    .logo {
      height:28px; width:auto; object-fit:contain;
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
    }
    .tagline {
      margin-top:12px;
      font-size:8px; font-weight:400; letter-spacing:0.3em;
      text-transform:uppercase;
      color:rgba(232,232,240,0.5);
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 2.3s forwards;
    }
    .date {
      margin-top:12px;
      font-size:8px; font-weight:300; letter-spacing:0.55em;
      color:rgba(97,40,219,0.5);
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 2.3s forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>
  <div class="content">
    <img src="{{ url_for('static', filename='logo-white.png') }}" alt="Lumen" class="logo">
    <div class="date">03.23.26</div>
  </div>
  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let particles = [];
      let W, H;
      // Scale particle count to screen area — desktop gets ~90, phones get ~35-45
      function getCount() {
        const area = window.innerWidth * window.innerHeight;
        const desktop = 1920 * 1080;
        return Math.round(Math.max(30, Math.min(90, 90 * (area / desktop))));
      }
      const COUNT = getCount();
      // Connection distance also scales — shorter on small screens
      const CONNECT_DIST = window.innerWidth < 600 ? 60 : 100;
      const CONNECT_ALPHA = window.innerWidth < 600 ? 0.04 : 0.08;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const startTime = Date.now();
      let lastTick = startTime;

      class Particle {
        constructor() { this.reset(true); }
        reset(initial) {
          this.x = Math.random() * W;
          this.y = initial ? Math.random() * H : Math.random() * H;
          this.vx = (Math.random() - 0.5) * 0.15;
          this.vy = -Math.random() * 0.15 - 0.03;
          const mobile = W < 600;
          this.size = mobile ? Math.random() * 1.4 + 0.5 : Math.random() * 2 + 0.8;
          this.opacity = mobile ? Math.random() * 0.3 + 0.08 : Math.random() * 0.4 + 0.12;
          this.life = Math.random() * 800 + 500;
          this.maxLife = this.life;
        }
        update(dt) {
          this.x += this.vx * dt;
          this.y += this.vy * dt;
          this.life -= dt;
          if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > W + 10) {
            this.reset(false);
          }
        }
        draw() {
          const fade = Math.min(this.life / 100, (this.maxLife - this.life) / 100, 1);
          ctx.globalAlpha = this.opacity * fade;
          ctx.fillStyle = '#6128DB';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      // Shooting stars — ease-out (constant speed → decelerate)
      function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }

      const shootingStars = [
        {
          // Primary: sweeps left→right, crossing just above the logo
          triggerMs: 4000, durationMs: 2200,
          x0: 0.05, y0: 0.38, x1: 0.92, y1: 0.50,
          trailMax: 14, headSize: 0.7, glowSize: 2,
          brightness: 0.6
        },
        {
          // Secondary: shorter, upper-right → lower-left, slightly later
          triggerMs: 7200, durationMs: 1600,
          x0: 0.88, y0: 0.24, x1: 0.20, y1: 0.40,
          trailMax: 10, headSize: 0.5, glowSize: 1.5,
          brightness: 0.4
        }
      ];

      shootingStars.forEach(s => {
        s.fired = false; s.active = false; s.trail = [];
      });

      function updateShootingStars(elapsed) {
        shootingStars.forEach(s => {
          if (!s.fired && elapsed > s.triggerMs) {
            s.fired = true; s.active = true;
            s.fireTime = elapsed; s.trail = [];
          }
          if (!s.active) return;

          const raw = Math.min((elapsed - s.fireTime) / s.durationMs, 1);
          const t = easeOutCubic(raw);

          const cx = s.x0 * W + (s.x1 - s.x0) * W * t;
          const cy = s.y0 * H + (s.y1 - s.y0) * H * t;

          if (raw < 1) {
            s.trail.push({ x: cx, y: cy });
            if (s.trail.length > s.trailMax) s.trail.shift();
          } else {
            // Star reached end — drain the trail
            s.trail.shift();
            if (s.trail.length === 0) { s.active = false; return; }
          }

          const draining = raw >= 1;
          const drainFade = draining ? s.trail.length / s.trailMax : 1;

          // Draw trail as smooth tapered line segments
          if (s.trail.length > 1) {
            for (let i = 1; i < s.trail.length; i++) {
              const a = s.trail[i - 1];
              const b = s.trail[i];
              const p = i / s.trail.length;
              const alpha = p * 0.35 * drainFade * s.brightness;

              // Thin white streak
              ctx.globalAlpha = alpha;
              ctx.strokeStyle = '#e8e8f0';
              ctx.lineWidth = p * s.headSize * 1.5;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();

              // Subtle glow behind
              ctx.globalAlpha = alpha * 0.2;
              ctx.strokeStyle = '#7c4dff';
              ctx.lineWidth = p * s.glowSize * 1.5;
              ctx.beginPath();
              ctx.moveTo(a.x, a.y);
              ctx.lineTo(b.x, b.y);
              ctx.stroke();
            }
          }

          // Tiny bright head dot
          if (!draining && s.trail.length > 0) {
            const head = s.trail[s.trail.length - 1];
            ctx.globalAlpha = 0.7 * s.brightness;
            ctx.fillStyle = '#fff';
            ctx.beginPath();
            ctx.arc(head.x, head.y, s.headSize * 0.8, 0, Math.PI * 2);
            ctx.fill();
          }
        });
      }

      function animate() {
        const now = Date.now();
        const elapsed = now - startTime;
        const dt = Math.min((now - lastTick) / 16.667, 3);
        lastTick = now;

        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => { p.update(dt); p.draw(); });

        // Subtle connections
        ctx.strokeStyle = '#6128DB';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < CONNECT_DIST) {
              ctx.globalAlpha = (1 - dist / CONNECT_DIST) * CONNECT_ALPHA;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        updateShootingStars(elapsed);
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
