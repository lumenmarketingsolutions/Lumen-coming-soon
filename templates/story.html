<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Lumen</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body {
      width:100%; height:100%; overflow:hidden;
      font-family:'Inter', -apple-system, sans-serif;
      background:#0a0a0f; color:#e8e8f0;
      -webkit-font-smoothing:antialiased;
    }

    /* Ambient orb glows — very slow drift, no pulsing/scaling */
    .orb {
      position:fixed; border-radius:50%;
      filter:blur(120px); pointer-events:none;
    }
    .orb-1 {
      width:60vw; height:60vw;
      background:radial-gradient(circle, rgba(97,40,219,0.25), transparent 70%);
      top:-15%; left:-20%;
      animation:orbDrift1 30s ease-in-out infinite;
    }
    .orb-2 {
      width:50vw; height:50vw;
      background:radial-gradient(circle, rgba(124,77,255,0.15), transparent 70%);
      bottom:-10%; right:-15%;
      animation:orbDrift2 35s ease-in-out infinite;
    }
    .orb-3 {
      width:35vw; height:35vw;
      background:radial-gradient(circle, rgba(97,40,219,0.12), transparent 70%);
      top:40%; left:45%;
      animation:orbDrift3 40s ease-in-out infinite;
    }
    /* Very gentle position drift only — no scale, no opacity change */
    @keyframes orbDrift1 {
      0%, 100% { transform:translate(0, 0); }
      50% { transform:translate(30px, 20px); }
    }
    @keyframes orbDrift2 {
      0%, 100% { transform:translate(0, 0); }
      50% { transform:translate(-20px, -15px); }
    }
    @keyframes orbDrift3 {
      0%, 100% { transform:translate(-50%, 0); }
      50% { transform:translate(-50%, -15px); }
    }

    /* Particle canvas */
    #particles {
      position:fixed; inset:0; z-index:1;
    }

    /* Content */
    .content {
      position:fixed; inset:0; z-index:2;
      display:flex; flex-direction:column;
      align-items:center; justify-content:center;
      padding:40px;
      text-align:center;
    }
    .logo {
      height:48px; width:auto; object-fit:contain;
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 1.5s forwards;
    }
    .tagline {
      margin-top:16px;
      font-size:13px; font-weight:400; letter-spacing:0.3em;
      text-transform:uppercase;
      color:rgba(232,232,240,0.5);
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 2.3s forwards;
    }
    .date {
      margin-top:10px;
      font-size:12px; font-weight:300; letter-spacing:0.25em;
      color:rgba(97,40,219,0.5);
      opacity:0; animation:fadeUp 1.8s cubic-bezier(0.22,1,0.36,1) 2.9s forwards;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(16px); }
      to { opacity:1; transform:translateY(0); }
    }
  </style>
</head>
<body>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
  <canvas id="particles"></canvas>
  <div class="content">
    <img src="{{ url_for('static', filename='logo-white.png') }}" alt="Lumen" class="logo">
    <div class="tagline">coming soon</div>
    <div class="date">03.23.26</div>
  </div>
  <script>
    (function() {
      const canvas = document.getElementById('particles');
      const ctx = canvas.getContext('2d');
      let particles = [];
      const COUNT = 90;
      let W, H;

      function resize() {
        W = canvas.width = window.innerWidth;
        H = canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener('resize', resize);

      const startTime = Date.now();
      let lastTick = startTime;

      class Particle {
        constructor() { this.reset(true); }
        reset(initial) {
          this.x = Math.random() * W;
          this.y = initial ? Math.random() * H : Math.random() * H;
          this.vx = (Math.random() - 0.5) * 0.15;
          this.vy = -Math.random() * 0.15 - 0.03;
          this.size = Math.random() * 2 + 0.8;
          this.opacity = Math.random() * 0.4 + 0.12;
          this.life = Math.random() * 800 + 500;
          this.maxLife = this.life;
        }
        update(dt) {
          this.x += this.vx * dt;
          this.y += this.vy * dt;
          this.life -= dt;
          if (this.life <= 0 || this.y < -10 || this.x < -10 || this.x > W + 10) {
            this.reset(false);
          }
        }
        draw() {
          const fade = Math.min(this.life / 100, (this.maxLife - this.life) / 100, 1);
          ctx.globalAlpha = this.opacity * fade;
          ctx.fillStyle = '#6128DB';
          ctx.beginPath();
          ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      for (let i = 0; i < COUNT; i++) particles.push(new Particle());

      // Shooting star
      let starFired = false;
      let starActive = false;
      let starX, starY, starLife;
      let starTrail = [];

      function updateStar(elapsed, dt) {
        if (!starFired && elapsed > 4000) {
          starFired = true;
          starActive = true;
          starX = W * 0.08;
          starY = H * 0.1;
          starLife = 45;
          starTrail = [];
        }
        if (!starActive) return;

        starX += 8 * dt;
        starY += 4.5 * dt;
        starLife -= dt;

        starTrail.push({ x: starX, y: starY });
        if (starTrail.length > 12) starTrail.shift();

        const headFade = Math.min(starLife / 15, 1);

        for (let i = 0; i < starTrail.length; i++) {
          const t = starTrail[i];
          const progress = i / starTrail.length;
          const alpha = progress * 0.4 * headFade;

          ctx.globalAlpha = alpha;
          ctx.fillStyle = '#e8e8f0';
          ctx.beginPath();
          ctx.arc(t.x, t.y, progress * 1, 0, Math.PI * 2);
          ctx.fill();

          ctx.globalAlpha = alpha * 0.25;
          ctx.fillStyle = '#7c4dff';
          ctx.beginPath();
          ctx.arc(t.x, t.y, progress * 2.5, 0, Math.PI * 2);
          ctx.fill();
        }

        ctx.globalAlpha = headFade * 0.8;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(starX, starY, 1, 0, Math.PI * 2);
        ctx.fill();

        ctx.globalAlpha = headFade * 0.2;
        ctx.fillStyle = '#7c4dff';
        ctx.beginPath();
        ctx.arc(starX, starY, 3, 0, Math.PI * 2);
        ctx.fill();

        if (starLife <= 0) {
          starTrail.shift();
          if (starTrail.length === 0) starActive = false;
        }
      }

      function animate() {
        const now = Date.now();
        const elapsed = now - startTime;
        const dt = Math.min((now - lastTick) / 16.667, 3);
        lastTick = now;

        ctx.clearRect(0, 0, W, H);
        particles.forEach(p => { p.update(dt); p.draw(); });

        // Subtle connections
        ctx.strokeStyle = '#6128DB';
        ctx.lineWidth = 0.5;
        for (let i = 0; i < particles.length; i++) {
          for (let j = i + 1; j < particles.length; j++) {
            const dx = particles[i].x - particles[j].x;
            const dy = particles[i].y - particles[j].y;
            const dist = Math.sqrt(dx * dx + dy * dy);
            if (dist < 100) {
              ctx.globalAlpha = (1 - dist / 100) * 0.08;
              ctx.beginPath();
              ctx.moveTo(particles[i].x, particles[i].y);
              ctx.lineTo(particles[j].x, particles[j].y);
              ctx.stroke();
            }
          }
        }

        updateStar(elapsed, dt);
        requestAnimationFrame(animate);
      }
      animate();
    })();
  </script>
</body>
</html>
